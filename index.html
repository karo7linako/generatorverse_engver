<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta property="og:type" content="website">
<meta property="og:url" content="https://karo7linako.github.io/generatorverse_engver/">
<meta property="og:title" content="Easter Verse Generator">
<meta property="og:description" content="Choose a verse for today — may the Word brighten your Spring 🌷">
<meta property="og:image" content="https://karo7linako.github.io/generatorverse_engver/images/linkphoto.png">

<title>Easter Verse Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Caveat&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Quicksand', sans-serif;
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(to bottom right, #fef6f9, #e3f7f2);
  color: #5c4033;
}

h1 {
  font-family: 'Fredoka', sans-serif;
  color: #d36ba3;
}

button {
  padding: 12px 20px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #ffc0cb;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #ff8fab;
}

#verse {
  margin-top: 25px;
  font-family: 'Caveat', cursive;
  font-size: 1.6em;
  background: #fff9fb;
  padding: 25px;
  border-radius: 20px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
  min-height: 80px;
}

.loader {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Easter Verse Generator</h1>
<p>May the Word brighten your Spring 🌷</p>

<!-- LANGUAGE SWITCH -->
<div>
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('ru')">Русский</button>
  <button onclick="setLang('pl')">Polski</button>
</div>

<br>

<button onclick="generateVerse()">🌼 Pick a verse 🌼</button>

<div class="loader" id="loader">Loading...</div>

<div id="verse"></div>

<script>
let currentLang = "en";

/* =========================
   FULL SYNCED DATABASE
========================= */
const verses = [
  {
    en: "Matthew 28:6 — He is not here; He has risen.",
    ru: "Матфея 28:6 — Его нет здесь — Он воскрес.",
    pl: "Mateusza 28:6 — Nie ma Go tu, bo zmartwychwstał."
  },
  {
    en: "Mark 16:6 — He has risen! He is not here.",
    ru: "Марка 16:6 — Он воскрес.",
    pl: "Marka 16:6 — Zmartwychwstał."
  },
  {
    en: "Luke 24:6 — He is not here; He has risen.",
    ru: "Луки 24:6 — Он воскрес.",
    pl: "Łukasza 24:6 — Zmartwychwstał."
  },
  {
    en: "John 20:29 — Blessed are those who have not seen and believed.",
    ru: "Иоанна 20:29 — Блаженны невидевшие и уверовавшие.",
    pl: "Jana 20:29 — Błogosławieni, którzy uwierzyli."
  },
  {
    en: "Acts 2:24 — God raised Him from the dead.",
    ru: "Деяния 2:24 — Бог воскресил Его.",
    pl: "Dzieje 2:24 — Bóg wskrzesił Go."
  },
  {
    en: "Romans 6:9 — Christ will never die again.",
    ru: "Римлянам 6:9 — Христос больше не умирает.",
    pl: "Rzymian 6:9 — Chrystus już więcej nie umiera."
  },
  {
    en: "1 Corinthians 15:20 — Christ is risen from the dead.",
    ru: "1 Коринфянам 15:20 — Христос воскрес.",
    pl: "1 Koryntian 15:20 — Chrystus zmartwychwstał."
  },
  {
    en: "1 Peter 1:3 — Living hope through resurrection.",
    ru: "1 Петра 1:3 — Живая надежда через воскресение.",
    pl: "1 Piotra 1:3 — Żywa nadzieja."
  },
  {
    en: "Revelation 1:18 — I am alive forever.",
    ru: "Откровение 1:18 — Я жив во веки веков.",
    pl: "Apokalipsa 1:18 — Żyję na wieki."
  },
  {
    en: "John 3:16 — For God so loved the world.",
    ru: "Иоанна 3:16 — Бог возлюбил мир.",
    pl: "Jana 3:16 — Bóg umiłował świat."
  },
  {
    en: "Romans 5:8 — Christ died for us.",
    ru: "Римлянам 5:8 — Христос умер за нас.",
    pl: "Rzymian 5:8 — Chrystus umarł za nas."
  },
  {
    en: "2 Corinthians 5:17 — New creation in Christ.",
    ru: "2 Коринфянам 5:17 — Новое творение.",
    pl: "2 Koryntian 5:17 — Nowe stworzenie."
  },
  {
    en: "Galatians 2:20 — Christ lives in me.",
    ru: "Галатам 2:20 — Христос живет во мне.",
    pl: "Galatów 2:20 — Żyje we mnie Chrystus."
  },
  {
    en: "Ephesians 2:8 — Saved by grace through faith.",
    ru: "Ефесянам 2:8 — Спасены по благодати.",
    pl: "Efezjan 2:8 — Zbawieni z łaski."
  },
  {
    en: "John 11:25 — I am the resurrection and the life.",
    ru: "Иоанна 11:25 — Я есмь воскресение и жизнь.",
    pl: "Jana 11:25 — Ja jestem zmartwychwstaniem."
  },
  {
    en: "Romans 6:23 — Gift of God is eternal life.",
    ru: "Римлянам 6:23 — Дар Божий — жизнь вечная.",
    pl: "Rzymian 6:23 — Dar Boga to życie wieczne."
  },
  {
    en: "John 8:12 — I am the light of the world.",
    ru: "Иоанна 8:12 — Я свет миру.",
    pl: "Jana 8:12 — Światłość świata."
  },
  {
    en: "Revelation 21:4 — No more death.",
    ru: "Откровение 21:4 — Смерти больше не будет.",
    pl: "Apokalipsa 21:4 — Nie będzie już śmierci."
  },
  {
    en: "Isaiah 25:8 — Death will be swallowed forever.",
    ru: "Исаия 25:8 — Смерть будет уничтожена.",
    pl: "Izajasza 25:8 — Śmierć zostanie zniszczona."
  }
];

/* =========================
   BUILD LANGUAGE MAP
========================= */
const versesByLang = { en: [], ru: [], pl: [] };

verses.forEach(v => {
  versesByLang.en.push({ text: v.en });
  versesByLang.ru.push({ text: v.ru });
  versesByLang.pl.push({ text: v.pl });
});

/* =========================
   LANGUAGE SWITCH
========================= */
function setLang(lang) {
  currentLang = lang;
}

/* =========================
   GENERATOR
========================= */
function generateVerse() {
  const verseBox = document.getElementById("verse");
  const loader = document.getElementById("loader");

  verseBox.textContent = "";
  loader.style.display = "block";

  setTimeout(() => {
    const list = versesByLang[currentLang];
    const selected = list[Math.floor(Math.random() * list.length)];

    verseBox.textContent = selected.text;
    loader.style.display = "none";
  }, 900);
}
</script>

</body>
</html>
