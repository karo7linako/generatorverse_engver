<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Easter Verse Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Caveat&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="images/icon.png" type="image/png">

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(to bottom right, #fef6f9, #e3f7f2);
      color: #5c4033;
    }

   img.easter-img {
      max-width: 220px;
      margin-bottom: 25px;
      border-radius: 20px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 3em;
      color: #d36ba3;
    }

    select, button {
      padding: 10px;
      border-radius: 10px;
      margin: 10px;
    }

    button {
      font-size: 18px;
      background-color: #ffc0cb;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #ff8fab;
    }

    #verse {
      margin-top: 30px;
      font-family: 'Caveat', cursive;
      font-size: 1.8em;
      background: #fff9fb;
      border: 2px dashed #f3c1e3;
      border-radius: 25px;
      padding: 30px;
      max-width: 650px;
      margin: auto;
      min-height: 120px;
    }

    #verse img {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 15px;
    }

    .loader {
      display: none;
      margin-top: 20px;
    }

   footer {
      margin-top: 50px;
      font-size: 0.9em;
      color: #a0795f;
    }
  </style>
</head>

<body>
  <img src="https://img.freepik.com/vetores-premium/feliz-pascoa-com-coelho-fofo_41327-1313.jpg?w=1380" alt="Happy Easter" class="easter-img">

  <h1 id="title">Easter Verse Generator</h1>

  <div id="subtitle">May the Word brighten your Spring 🌷</div>

  <select id="langSelect" onchange="updateUI()">
    <option value="en">English</option>
    <option value="pl">Polski</option>
    <option value="ru">Русский</option>
    <option value="ro">Română</option>
  </select>

  <br>

  <button id="btn" onclick="generateVerse()">🌼 Pick a verse 🌼</button>

  <div class="loader" id="loader">
    <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcjNyYzI4MmlnZmd2bnQ5NTB1ZXFhNTU1M3Fhc21naHRmYWRkeHc1bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/lkcIQY7IuctvFCGAD3/giphy.gif" style="max-height: 100px;">
    <div id="loaderText">Picking up a verse...</div>
  </div>

  <div id="verse"></div>

  <script>
    const uiText = {
      en: {
        title: "Easter Verse Generator",
        subtitle: "May the Word brighten your Spring 🌷",
        button: "🌼 Pick a verse 🌼",
        loading: "⏳ Loading..."
      },
      pl: {
        title: "Generator Wersetów Wielkanocnych",
        subtitle: "Niech Słowo rozjaśni Twoją wiosnę 🌷",
        button: "🌼 Wylosuj werset 🌼",
        loading: "⏳ Ładowanie..."
      },
      ru: {
        title: "Генератор Пасхальных стихов",
        subtitle: "Пусть Слово осветит вашу весну 🌷",
        button: "🌼 Выбрать стих 🌼",
        loading: "⏳ Загрузка..."
      },
      ro: {
        title: "Generator de versete de Paște",
        subtitle: "Cuvântul să-ți lumineze primăvara 🌷",
        button: "🌼 Alege un verset 🌼",
        loading: "⏳ Se încarcă..."
      }
    };

   const verses = [
  { en: "Matthew 28:6", ru: "Матфея 28:6", pl: "Mateusza 28:6", ro: "Matei 28:6", image: "https://wallpapersok.com/images/high/aesthetic-nature-with-daisies-e92hb028mxshzdp0.webp" },

  { en: "Matthew 28:5–6", ru: "Матфея 28:5–6", pl: "Mateusza 28:5–6", ro: "Matei 28:5–6", image: "https://wallpapers.com/images/high/heaven-background-ahcgzwiaas4960lj.webp" },

  { en: "Mark 16:6", ru: "Марка 16:6", pl: "Marka 16:6", ro: "Marcu 16:6", image: "https://wallpapers.com/images/hd/beautiful-sunset-water-view-d7plmadn4jfvgl10.webp" },

  { en: "Luke 24:6", ru: "Луки 24:6", pl: "Łukasza 24:6", ro: "Luca 24:6", image: "https://wallpapersok.com/images/high/aesthetic-nature-with-daisies-e92hb028mxshzdp0.webp" },

  { en: "Luke 24:34", ru: "Луки 24:34", pl: "Łukasza 24:34", ro: "Luca 24:34", image: "https://wallpapers.com/images/high/heaven-background-ahcgzwiaas4960lj.webp" },

  { en: "John 20:1", ru: "Иоанна 20:1", pl: "Jana 20:1", ro: "Ioan 20:1", image: "https://wallpapers.com/images/hd/beautiful-sunset-water-view-d7plmadn4jfvgl10.webp" },

  { en: "John 20:8", ru: "Иоанна 20:8", pl: "Jana 20:8", ro: "Ioan 20:8", image: "https://wallpapersok.com/images/high/aesthetic-nature-with-daisies-e92hb028mxshzdp0.webp" },

  { en: "John 20:29", ru: "Иоанна 20:29", pl: "Jana 20:29", ro: "Ioan 20:29", image: "https://wallpapers.com/images/high/heaven-background-ahcgzwiaas4960lj.webp" },

  { en: "Acts 2:24", ru: "Деяния 2:24", pl: "Dzieje 2:24", ro: "Fapte 2:24", image: "https://wallpapers.com/images/hd/beautiful-sunset-water-view-d7plmadn4jfvgl10.webp" },

  { en: "Acts 3:15", ru: "Деяния 3:15", pl: "Dzieje 3:15", ro: "Fapte 3:15", image: "https://wallpapersok.com/images/high/aesthetic-nature-with-daisies-e92hb028mxshzdp0.webp" },

  { en: "Romans 1:4", ru: "Римлянам 1:4", pl: "Rzymian 1:4", ro: "Romani 1:4", image: "https://wallpapers.com/images/high/heaven-background-ahcgzwiaas4960lj.webp" },

  { en: "Romans 4:25", ru: "Римлянам 4:25", pl: "Rzymian 4:25", ro: "Romani 4:25", image: "https://wallpapers.com/images/hd/beautiful-sunset-water-view-d7plmadn4jfvgl10.webp" },

  { en: "Romans 6:9", ru: "Римлянам 6:9", pl: "Rzymian 6:9", ro: "Romani 6:9", image: "https://wallpapersok.com/images/high/aesthetic-nature-with-daisies-e92hb028mxshzdp0.webp" },

  { en: "Romans 8:34", ru: "Римлянам 8:34", pl: "Rzymian 8:34", ro: "Romani 8:34", image: "https://wallpapers.com/images/high/heaven-background-ahcgzwiaas4960lj.webp" },

  { en: "1 Corinthians 15:3–4", ru: "1 Коринфянам 15:3–4", pl: "1 Koryntian 15:3–4", ro: "1 Corinteni 15:3–4", image: "https://wallpapers.com/images/hd/beautiful-sunset-water-view-d7plmadn4jfvgl10.webp" },

  { en: "1 Corinthians 15:20", ru: "1 Коринфянам 15:20", pl: "1 Koryntian 15:20", ro: "1 Corinteni 15:20", image: "https://wallpapersok.com/images/high/aesthetic-nature-with-daisies-e92hb028mxshzdp0.webp" },

  { en: "2 Corinthians 5:17", ru: "2 Коринфянам 5:17", pl: "2 Koryntian 5:17", ro: "2 Corinteni 5:17", image: "https://wallpapers.com/images/high/heaven-background-ahcgzwiaas4960lj.webp" },

  { en: "Colossians 3:1", ru: "Колосянам 3:1", pl: "Kolosan 3:1", ro: "Coloseni 3:1", image: "https://wallpapers.com/images/hd/beautiful-sunset-water-view-d7plmadn4jfvgl10.webp" },

  { en: "Revelation 21:4", ru: "Откровение 21:4", pl: "Apokalipsa 21:4", ro: "Apocalipsa 21:4", image: "https://wallpapersok.com/images/high/aesthetic-nature-with-daisies-e92hb028mxshzdp0.webp" },

  { en: "Isaiah 25:8", ru: "Izajasza 25:8", pl: "Izajasza 25:8", ro: "Isaia 25:8", image: "https://wallpapers.com/images/high/heaven-background-ahcgzwiaas4960lj.webp" }
];

    function getLang() {
      return document.getElementById("langSelect").value;
    }

    function updateUI() {
      const lang = getLang();
      const ui = uiText[lang];

      document.getElementById("title").textContent = ui.title;
      document.getElementById("subtitle").textContent = ui.subtitle;
      document.getElementById("btn").textContent = ui.button;

      document.getElementById("loaderText").textContent = ui.loading;
    }

    function generateVerse() {
      const verseBox = document.getElementById("verse");
      const loader = document.getElementById("loader");
      const lang = getLang();

      verseBox.innerHTML = "";
      loader.style.display = "block";

      setTimeout(() => {
        const random = Math.floor(Math.random() * verses.length);

        verseBox.innerHTML = `
          <div>${verses[random][lang]}</div>
          <img src="${verses[random].image}">
        `;

        loader.style.display = "none";
      }, 800);
    }

    updateUI();
  </script>

  <footer>
    ✝️ © 2026
  </footer>
</body>
