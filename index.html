<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Easter Verse Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Caveat&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="images/icon.png" type="image/png">

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(to bottom right, #fef6f9, #e3f7f2);
      color: #5c4033;
    }

    h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 3em;
      color: #d36ba3;
    }

    select, button {
      padding: 10px;
      border-radius: 10px;
      margin: 10px;
    }

    button {
      font-size: 18px;
      background-color: #ffc0cb;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #ff8fab;
    }

    #verse-image img {
  max-width: 300px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}


    img.easter-img {
      max-width: 220px;
      margin-bottom: 25px;
      border-radius: 20px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }
    #verse {
      margin-top: 30px;
      font-family: 'Caveat', cursive;
      font-size: 1.8em;
      background: #fff9fb;
      border: 2px dashed #f3c1e3;
      border-radius: 25px;
      padding: 30px;
      max-width: 650px;
      margin: auto;
      min-height: 120px;
    }

    #verse img {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 15px;
    }

    .loader {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1 id="title">Easter Verse Generator</h1>
  <img src="https://img.freepik.com/vetores-premium/feliz-pascoa-com-coelho-fofo_41327-1313.jpg?w=1380" alt="Happy Easter" class="easter-img">
  <div id="subtitle">May the Word brighten your Spring 🌷</div>

  <select id="langSelect" onchange="updateUI()">
    <option value="en">English</option>
    <option value="pl">Polski</option>
    <option value="ru">Русский</option>
    <option value="ro">Română</option>
  </select>

  <br>

  <button id="btn" onclick="generateVerse()">🌼 Pick a verse 🌼</button>

<div class="loader" id="loader">
  <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcjNyYzI4MmlnZmd2bnQ5NTB1ZXFhNTU1M3Fhc21naHRmYWRkeHc1bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/lkcIQY7IuctvFCGAD3/giphy.gif" alt="Króliczek ładuje" style="max-height: 100px;">
  <div>Picking up a verse...</div>
</div>


  <div id="verse"></div>

  <script>
    // 🌍 UI translations
    const uiText = {
      en: {
        title: "Easter Verse Generator",
        subtitle: "May the Word brighten your Spring 🌷",
        button: "🌼 Pick a verse 🌼",
        loading: "⏳ Loading..."
      },
      pl: {
        title: "Generator Wersetów Wielkanocnych",
        subtitle: "Niech Słowo rozjaśni Twoją wiosnę 🌷",
        button: "🌼 Wylosuj werset 🌼",
        loading: "⏳ Ładowanie..."
      },
      ru: {
        title: "Генератор Пасхальных стихов",
        subtitle: "Пусть Слово осветит вашу весну 🌷",
        button: "🌼 Выбрать стих 🌼",
        loading: "⏳ Загрузка..."
      },
      ro: {
        title: "Generator de versete de Paște",
        subtitle: "Cuvântul să-ți lumineze primăvara 🌷",
        button: "🌼 Alege un verset 🌼",
        loading: "⏳ Se încarcă..."
      }
    };

    const verses = [
      { en: "Matthew 28:6", ru: "Матфея 28:6", pl: "Mateusza 28:6", ro: "Matei 28:6", image: "https://wallpapersok.com/images/high/aesthetic-nature-with-daisies-e92hb028mxshzdp0.webp" },
      { en: "Luke 24:6", ru: "Луки 24:6", pl: "Łukasza 24:6", ro: "Luca 24:6", image: "https://wallpapers.com/images/high/heaven-background-ahcgzwiaas4960lj.webp" },
      { en: "John 20:29", ru: "Иоанна 20:29", pl: "Jana 20:29", ro: "Ioan 20:29", image: "https://wallpapers.com/images/hd/beautiful-sunset-water-view-d7plmadn4jfvgl10.webp" }
    ];

    function getLang() {
      return document.getElementById("langSelect").value;
    }

    function updateUI() {
      const lang = getLang();
      const ui = uiText[lang];

      document.getElementById("title").textContent = ui.title;
      document.getElementById("subtitle").textContent = ui.subtitle;
      document.getElementById("btn").textContent = ui.button;
      document.getElementById("loader").textContent = ui.loading;
    }

    function generateVerse() {
      const verseBox = document.getElementById("verse");
      const loader = document.getElementById("loader");
      const lang = getLang();

      verseBox.innerHTML = "";
      loader.style.display = "block";

      setTimeout(() => {
        const random = Math.floor(Math.random() * verses.length);

        verseBox.innerHTML = `
          <div>${verses[random][lang]}</div>
          <img src="${verses[random].image}">
        `;

        loader.style.display = "none";
      }, 800);
    }

    // init UI on load
    updateUI();
  </script>

</body>
</html>
